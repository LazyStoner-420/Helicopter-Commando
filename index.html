<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Helicopter Commando: Overdrive</title>
    <style>
        body { margin: 0; background: #05050a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #00ffcc; pointer-events: none; z-index: 100; }
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #fff; text-align: center; padding-top: 15%; z-index: 200; }
        button { background: #00ffcc; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 1.2rem; }
    </style>
</head>
<body onload="Game.start()">
    <div id="ui-layer">
        <div id="stat-bar" style="font-size: 1.8rem; letter-spacing: 2px;">LVL 01 | SCORE 0000</div>
        <div style="width: 280px; height: 10px; border: 2px solid #00ffcc; margin-top: 8px;">
            <div id="health-fill" style="width: 100%; height: 100%; background: #00ffcc; box-shadow: 0 0 10px #00ffcc;"></div>
        </div>
    </div>
    <div id="ad-overlay">
        <h1 style="color: #ff3300;">MISSION FAILURE</h1>
        <button onclick="Game.showAd()">REDEPLOY (AD)</button>
        <button onclick="location.reload()">ABORT</button>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
// --- CORE ENGINE FIXES APPLIED ---
const TacticalAI = {
    activated: false,
    speak(text) {
        if (!this.activated) return;
        window.speechSynthesis.cancel(); // Fix #2: Prevent audio stacking
        const msg = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        msg.voice = voices.find(v => v.name.includes('Natural') || v.name.includes('Soft')) || voices[0];
        msg.pitch = 0.85; msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    },
    trigger() { if(!this.activated) { this.activated = true; this.speak("Commando, systems online."); } }
};

const InputHandler = {
    keys: {}, deadzone: 0.15,
    init() {
        window.addEventListener('keydown', e => { this.keys[e.code] = true; TacticalAI.trigger(); });
        window.addEventListener('keyup', e => this.keys[e.code] = false);
    },
    getMovement() {
        let x = 0;
        if (this.keys['KeyA'] || this.keys['ArrowLeft']) x = -1;
        if (this.keys['KeyD'] || this.keys['ArrowRight']) x = 1;
        const gp = navigator.getGamepads()[0];
        if (gp && Math.abs(gp.axes[0]) > this.deadzone) x = gp.axes[0];
        return x;
    }
};

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 1.0; this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.2; this.life -= 0.03; }
}

const Game = {
    level: 1, score: 0, bullets: [], enemies: [], particles: [], shake: 0,
    start() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        InputHandler.init();
        this.player = { x: 150, y: 500, vy: 0, health: 100, onGround: true, lastFire: 0 };
        this.loop();
    },
    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },
    spawnExplosion(x, y, color) {
        for(let i=0; i<12; i++) this.particles.push(new Particle(x, y, color));
        this.shake = 8;
        if (this.particles.length > 100) this.particles.splice(0, 20); // Fix #3: Particle Cap
    },
    loop() { this.update(); this.draw(); requestAnimationFrame(() => this.loop()); },
    update() {
        if (this.player.health <= 0) return;
        const move = InputHandler.getMovement();
        this.player.x = Math.max(0, Math.min(this.canvas.width - 40, this.player.x + move * 10));

        const gp = navigator.getGamepads()[0];
        const jumping = this.keys['Space'] || (gp && (gp.buttons[0].pressed || gp.buttons[1].pressed));
        if (jumping && this.player.onGround) { this.player.vy = -18; this.player.onGround = false; }
        this.player.y += this.player.vy; this.player.vy += 0.9;
        if (this.player.y >= 500) { this.player.y = 500; this.player.onGround = true; this.player.vy = 0; }

        if ((jumping || this.keys['KeyF']) && Date.now() - this.player.lastFire > 120) {
            this.bullets.push({ x: this.player.x + 40, y: this.player.y + 25, vx: 20 });
            this.player.lastFire = Date.now();
        }

        if (Math.random() < 0.007 + (this.level * 0.008)) {
            this.enemies.push({ x
