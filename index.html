<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Helicopter Commando: Gold</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; cursor: crosshair; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #hud { 
            position: absolute; top: 15px; left: 15px; 
            color: #f0e68c; font-family: 'Courier New', Courier, monospace; 
            text-shadow: 2px 2px #000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="hud">HP: 100 | SCORE: 0000 | STATUS: ACTIVE</div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

let Game = {
    active: false, score: 0, timescale: 1, tick: 0,
    p: { x: 300, y: 500, vx: 0, vy: 0, ground: true, lastFire: 0, hp: 100 },
    bullets: [], enemies: [], particles: [], mouse: { x: 0, y: 0 }
};

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// --- Inputs ---
const keys = {};
window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if(!Game.active) Game.active = true;
    if(e.code === 'ShiftLeft') Game.timescale = 0.35; 
});
window.addEventListener('keyup', e => { 
    keys[e.code] = false; 
    if(e.code === 'ShiftLeft') Game.timescale = 1;
});
window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    Game.mouse.x = e.clientX - rect.left;
    Game.mouse.y = e.clientY - rect.top;
});
window.addEventListener('mousedown', () => { if(Game.active) fire(); else Game.active = true; });

function fire() {
    const now = Date.now();
    if(now - Game.p.lastFire < 130) return;
    Game.p.lastFire = now;
    const angle = Math.atan2(Game.mouse.y - (Game.p.y + 25), Game.mouse.x - (Game.p.x + 20));
    Game.bullets.push({ 
        x: Game.p.x + 20, y: Game.p.y + 25, 
        vx: Math.cos(angle) * 24, vy: Math.sin(angle) * 24 
    });
}

function spawnExplosion(x, y, color) {
    for(let i=0; i<6; i++) {
        Game.particles.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color
        });
    }
}

function update() {
    if(!Game.active) return;
    const ts = Game.timescale;
    Game.tick++;

    // --- Physics ---
    if(keys['KeyA'] || keys['ArrowLeft']) Game.p.vx = -7;
    else if(keys['KeyD'] || keys['ArrowRight']) Game.p.vx = 7;
    else Game.p.vx *= 0.82;

    if((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && Game.p.ground) { 
        Game.p.vy = -19; Game.p.ground = false; 
    }

    Game.p.x += Game.p.vx * ts;
    Game.p.y += Game.p.vy * ts;
    Game.p.vy += 0.85 * ts;

    if(Game.p.y >= canvas.height - 130) { Game.p.y = canvas.height - 130; Game.p.ground = true; Game.p.vy = 0; }

    // --- Enemies ---
    if(Math.random() < 0.015) {
        Game.enemies.push({ x: Math.random() > 0.5 ? -100 : canvas.width + 100, y: 80 + Math.random() * 200, hp: 3, phase: Math.random() * 10 });
    }

    Game.enemies.forEach((e, i) => {
        e.phase += 0.02 * ts;
        const targetX = Game.p.x + Math.sin(e.phase) * 280;
        const targetY = 120 + Math.cos(e.phase) * 90;
        e.x += (targetX - e.x) * 0.025 * ts;
        e.y += (targetY - e.y) * 0.025 * ts;

        Game.bullets.forEach((b, bi) => {
            if(Math.hypot(b.x - e.x, b.y - e.y) < 40) {
                e.hp--; Game.bullets.splice(bi, 1);
                spawnExplosion(e.x, e.y, '#ff4500');
                if(e.hp <= 0) { Game.enemies.splice(i, 1); Game.score += 100; hud.innerText = `HP: ${Math.ceil(Game.p.hp)} | SCORE: ${Game.score.toString().padStart(4, '0')} | STATUS: COMBAT`; }
            }
        });

        if(Math.hypot(e.x - Game.p.x, e.y - Game.p.y) < 45) { 
            Game.p.hp -= 0.4; 
            if(Game.p.hp <= 0) location.reload(); 
        }
    });

    Game.bullets.forEach((b, i) => { b.x += b.vx * ts; b.y += b.vy * ts; if(b.x < -50 || b.x > canvas.width + 50) Game.bullets.splice(i, 1); });
    Game.particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; if(p.life <= 0) Game.particles.splice(i, 1); });
}

function draw() {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Sand
    ctx.fillStyle = '#c2b280';
    ctx.fillRect(0, canvas.height - 130, canvas.width, 130);

    if(!Game.active) {
        ctx.fillStyle = '#f0e68c'; ctx.textAlign = 'center'; ctx.font = '24px Courier New';
        ctx.fillText('HELICOPTER COMMANDO: CLICK TO START', canvas.width/2, canvas.height/2);
        return;
    }

    // --- Draw Player ---
    const p = Game.p;
    const angle = Math.atan2(Game.mouse.y - (p.y + 25), Game.mouse.x - (p.x + 20));
    
    ctx.fillStyle = "#556b2f"; ctx.fillRect(p.x + 10, p.y - 5, 20, 18); // Helmet
    ctx.fillStyle = "#d2b48c"; ctx.fillRect(p.x + 10, p.y + 13, 20, 25); // Body
    ctx.fillStyle = "#3d2b1f"; ctx.fillRect(p.x + 5, p.y + 15, 8, 20); // Pack
    
    ctx.save();
    ctx.translate(p.x + 20, p.y + 25);
    ctx.rotate(angle);
    ctx.fillStyle = "#222"; ctx.fillRect(0, -4, 28, 9); // Gun
    ctx.restore();

    // --- Draw Enemies ---
    Game.enemies.forEach(e => {
        ctx.fillStyle = "#4b5320"; ctx.fillRect(e.x - 40, e.y - 15, 80, 35); // Body
        ctx.fillStyle = (Game.tick % 4 < 2) ? "#333" : "#555"; 
        ctx.fillRect(e.x - 60, e.y - 20, 120, 5); // Flickering Rotor
    });

    // Bullets & Particles
    ctx.fillStyle = "#fff"; Game.bullets.forEach(b => ctx.fillRect(b.x-3, b.y-3, 6, 6));
    Game.particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
    ctx.globalAlpha = 1;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
